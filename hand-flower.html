<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Hand Flower</title>
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body {
    background: #0a0a12;
    color: #e8e4d9;
    font-family: 'Segoe UI', system-ui, sans-serif;
    min-height: 100vh;
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    gap: 20px;
    padding: 20px;
  }
  h1 {
    font-size: 18px;
    font-weight: 400;
    color: #8a8570;
    letter-spacing: 0.08em;
    text-transform: uppercase;
  }
  #canvas-wrap {
    position: relative;
    width: min(640px, 100%);
    aspect-ratio: 4/3;
    border-radius: 16px;
    overflow: hidden;
    border: 1px solid #1e1e2a;
    background: linear-gradient(to bottom, #0a1020, #1a0a10);
  }
  #video {
    width: 100%;
    height: 100%;
    object-fit: cover;
    transform: scaleX(-1);
    display: block;
  }
  #flower-canvas {
    position: absolute;
    inset: 0;
    width: 100%;
    height: 100%;
    pointer-events: none;
  }
  #overlay-text {
    position: absolute;
    bottom: 16px;
    left: 50%;
    transform: translateX(-50%);
    font-size: 13px;
    color: rgba(255,255,255,0.5);
    white-space: nowrap;
    pointer-events: none;
  }
  .controls {
    display: flex;
    gap: 24px;
    flex-wrap: wrap;
    justify-content: center;
  }
  .badge {
    display: flex;
    align-items: center;
    gap: 8px;
    padding: 8px 16px;
    border-radius: 100px;
    border: 1px solid #1e1e2a;
    font-size: 13px;
    color: #8a8570;
    background: #0f0f18;
  }
  .badge .dot { width: 8px; height: 8px; border-radius: 50%; }
  .badge .val { font-weight: 600; color: #e8e4d9; min-width: 32px; text-align: right; }
  #start-btn {
    padding: 10px 28px;
    border-radius: 10px;
    border: 1px solid #2e2e40;
    background: #14141f;
    color: #e8e4d9;
    font-size: 14px;
    cursor: pointer;
    letter-spacing: 0.03em;
    transition: background 0.15s, border-color 0.15s;
  }
  #start-btn:hover { background: #1e1e2e; border-color: #3e3e58; }
  #start-btn:disabled { opacity: 0.5; cursor: default; }
  #status { font-size: 13px; color: #6a6555; text-align: center; min-height: 18px; }
</style>
</head>
<body>
<h1>Hand Flower</h1>
<div id="canvas-wrap">
  <video id="video" autoplay playsinline muted></video>
  <canvas id="flower-canvas"></canvas>
  <div id="overlay-text">Left = spread  |  Right = bloom</div>
</div>
<div id="status">Click start to enable camera</div>
<button id="start-btn">Start camera</button>
<div class="controls">
  <div class="badge"><div class="dot" style="background:#4ade80;"></div>Spread <span class="val" id="spread-val">—</span></div>
  <div class="badge"><div class="dot" style="background:#ff4455;"></div>Bloom <span class="val" id="bloom-val">—</span></div>
</div>

<script src="https://cdn.jsdelivr.net/npm/@mediapipe/hands/hands.js" crossorigin="anonymous"></script>
<script src="https://cdn.jsdelivr.net/npm/@mediapipe/camera_utils/camera_utils.js" crossorigin="anonymous"></script>

<script>
const video = document.getElementById('video');
const fc = document.getElementById('flower-canvas');
const ctx = fc.getContext('2d');
const statusEl = document.getElementById('status');
const startBtn = document.getElementById('start-btn');
const spreadValEl = document.getElementById('spread-val');
const bloomValEl = document.getElementById('bloom-val');

let spreadPct = 0.3;
let bloomPct = 0.0;
let targetSpread = 0.3;
let targetBloom = 0.0;

function dist(a, b) { return Math.hypot(a.x - b.x, a.y - b.y); }

function resizeCanvas() {
  const rect = fc.parentElement.getBoundingClientRect();
  fc.width = rect.width;
  fc.height = rect.height;
}

function drawStem(baseX, baseY, tipX, tipY) {
  ctx.save();
  ctx.beginPath();
  ctx.moveTo(baseX, baseY);
  const midX = (baseX + tipX) / 2;
  const midY = (baseY + tipY) / 2;
  const dx = tipX - baseX;
  const dy = tipY - baseY;
  const len = Math.sqrt(dx*dx + dy*dy);
  const nx = -dy / len;
  const ny = dx / len;
  const bend = spreadPct * 40;
  const cpX = midX + nx * bend;
  const cpY = midY + ny * bend;
  ctx.quadraticCurveTo(cpX, cpY, tipX, tipY);
  ctx.strokeStyle = '#0a0a0a';
  ctx.lineWidth = Math.max(1.5, fc.width * 0.004);
  ctx.lineCap = 'round';
  ctx.stroke();
  ctx.restore();
}

function drawHibiscus(x, y, size, bloom) {
  const petalCount = 5;
  const petalLen = size * (0.6 + bloom * 0.4);
  // Glow
  if (bloom > 0.05) {
    const glow = ctx.createRadialGradient(x, y, size * 0.3, x, y, size * 2.5);
    glow.addColorStop(0, `rgba(255,30,30,${bloom * 0.35})`);
    glow.addColorStop(1, 'rgba(255,0,0,0)');
    ctx.fillStyle = glow;
    ctx.beginPath();
    ctx.arc(x, y, size * 2.5, 0, Math.PI * 2);
    ctx.fill();
  }
  for (let i = 0; i < petalCount; i++) {
    const angle = (i / petalCount) * Math.PI * 2 - Math.PI / 2;
    const px = x + Math.cos(angle) * petalLen * 0.5;
    const py = y + Math.sin(angle) * petalLen * 0.5;
    ctx.save();
    ctx.translate(px, py);
    ctx.rotate(angle);
    // Petal shape
    ctx.beginPath();
    ctx.moveTo(0, 0);
    ctx.quadraticCurveTo(-petalLen * 0.35, -petalLen * 0.5, 0, -petalLen);
    ctx.quadraticCurveTo(petalLen * 0.35, -petalLen * 0.5, 0, 0);
    ctx.closePath();
    // 3D red gradient
    const grd = ctx.createRadialGradient(0, -petalLen * 0.3, petalLen * 0.05, 0, -petalLen * 0.4, petalLen * 0.8);
    grd.addColorStop(0, '#7a0015');
    grd.addColorStop(0.4, '#c8102c');
    grd.addColorStop(0.8, '#ff3355');
    grd.addColorStop(1, '#ff6680');
    ctx.fillStyle = grd;
    ctx.fill();
    // Vein
    ctx.beginPath();
    ctx.moveTo(0, -petalLen * 0.08);
    ctx.quadraticCurveTo(petalLen * 0.02, -petalLen * 0.45, 0, -petalLen * 0.85);
    ctx.strokeStyle = 'rgba(60,0,10,0.25)';
    ctx.lineWidth = 1;
    ctx.stroke();
    // Edge highlight for 3D
    ctx.beginPath();
    ctx.moveTo(0, -petalLen * 0.02);
    ctx.quadraticCurveTo(-petalLen * 0.3, -petalLen * 0.48, -petalLen * 0.02, -petalLen * 0.95);
    ctx.strokeStyle = 'rgba(255,180,180,0.15)';
    ctx.lineWidth = 1.2;
    ctx.stroke();
    ctx.restore();
  }
  // Center stigma / stamens
  ctx.save();
  ctx.beginPath();
  ctx.arc(x, y, size * 0.12, 0, Math.PI * 2);
  const centerGrad = ctx.createRadialGradient(x - size*0.02, y - size*0.02, size*0.01, x, y, size*0.12);
  centerGrad.addColorStop(0, '#ffea70');
  centerGrad.addColorStop(0.6, '#e6a800');
  centerGrad.addColorStop(1, '#8a5000');
  ctx.fillStyle = centerGrad;
  ctx.fill();
  // Stamen filaments
  for (let s = 0; s < 6; s++) {
    const sa = (s / 6) * Math.PI * 2;
    const sr = size * 0.18;
    ctx.beginPath();
    ctx.arc(x + Math.cos(sa) * sr, y + Math.sin(sa) * sr, size * 0.025, 0, Math.PI * 2);
    ctx.fillStyle = '#c49800';
    ctx.fill();
  }
  ctx.restore();
}

function drawScene() {
  const W = fc.width, H = fc.height;
  ctx.clearRect(0, 0, W, H);

  const baseX = W * 0.5;
  const baseY = H * 0.94;
  const maxStem = H * 0.72;

  // Flower positions: 5 flowers, each spreading outward
  // Angle offsets and sizes for visual variety
  const configs = [
    { angle: -0.9,  lenMul: 0.95, sizeBase: 0.42 },
    { angle: -0.45, lenMul: 1.05, sizeBase: 0.50 },
    { angle: 0.0,   lenMul: 1.10, sizeBase: 0.55 },
    { angle: 0.45,  lenMul: 1.05, sizeBase: 0.50 },
    { angle: 0.9,   lenMul: 0.95, sizeBase: 0.42 },
  ];

  for (let i = 0; i < configs.length; i++) {
    const cfg = configs[i];
    const angle = cfg.angle * (1 + spreadPct * 0.8);
    const stemLen = maxStem * cfg.lenMul * (0.3 + spreadPct * 0.7);
    const tipX = baseX + Math.sin(angle) * stemLen * 0.5;
    const tipY = baseY - stemLen;
    drawStem(baseX, baseY, tipX, tipY);
    const flowerSize = W * 0.07 * cfg.sizeBase * (1 + bloomPct * 0.3);
    drawHibiscus(tipX, tipY, flowerSize, bloomPct);
  }
}

function animate() {
  const lerp = 0.1;
  spreadPct += (targetSpread - spreadPct) * lerp;
  bloomPct  += (targetBloom  - bloomPct) * lerp;
  drawScene();
  requestAnimationFrame(animate);
}

// Start camera
startBtn.addEventListener('click', async () => {
  startBtn.disabled = true;
  statusEl.textContent = 'Requesting camera access…';
  let stream;
  try {
    stream = await navigator.mediaDevices.getUserMedia({
      video: { facingMode: 'user', width: 640, height: 480 }
    });
  } catch (err) {
    statusEl.textContent = 'Camera error: ' + err.message;
    startBtn.disabled = false;
    return;
  }
  video.srcObject = stream;
  await new Promise(r => { video.onloadedmetadata = r; });
  resizeCanvas();
  statusEl.textContent = 'Loading hand-tracking model…';
  const hands = new Hands({
    locateFile: f => `https://cdn.jsdelivr.net/npm/@mediapipe/hands/${f}`
  });
  hands.setOptions({
    maxNumHands: 2,
    modelComplexity: 1,
    minDetectionConfidence: 0.65,
    minTrackingConfidence: 0.5
  });
  hands.onResults(results => {
    let leftSeen = false, rightSeen = false;
    if (results.multiHandLandmarks && results.multiHandedness) {
      results.multiHandLandmarks.forEach((lms, i) => {
        const label = results.multiHandedness[i].label;
        const isLeft = label === 'Right';
        const isRight = label === 'Left';
        const thumb = lms[4];
        const indexTip = lms[8];
        const d = dist(thumb, indexTip);
        const pct = Math.min(1, Math.max(0, (d - 0.02) / 0.26));
        if (isLeft) {
          targetSpread = pct;
          leftSeen = true;
          spreadValEl.textContent = Math.round(pct * 100) + '%';
        }
        if (isRight) {
          targetBloom = pct;
          rightSeen = true;
          bloomValEl.textContent = Math.round(pct * 100) + '%';
        }
      });
    }
    if (!leftSeen) spreadValEl.textContent = '—';
    if (!rightSeen) bloomValEl.textContent = '—';
    const count = results.multiHandLandmarks?.length || 0;
    if (count === 0) {
      statusEl.textContent = 'Show your hands to the camera';
    } else if (count === 1) {
      statusEl.textContent = 'One hand detected — show both for full control';
    } else {
      statusEl.textContent = 'Both hands detected ✓';
    }
  });
  const camera = new Camera(video, {
    onFrame: async () => { await hands.send({ image: video }); },
    width: 640,
    height: 480
  });
  await camera.start();
  startBtn.style.display = 'none';
  statusEl.textContent = 'Show your hands ✋';
});

// Init
resizeCanvas();
animate();
window.addEventListener('resize', resizeCanvas);
</script>
</body>
</html>
